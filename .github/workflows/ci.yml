# GitHub Actions CI for channel-analytics
#
# 设计目标(PLAN.md §6 P0):
#   - 阻断:任何形式的明文 JWT/SESSION/DB 凭据
#   - 阻断:品牌名/客户代号/ERP 厂商字符串
#   - 阻断:真实 PII(手机/身份证/邮箱)
#   - 阻断:测试不通过
#
# Jobs:
#   1. lint + test        — ruff / mypy / pytest(矩阵 Python 3.11 / 3.12)
#   2. secret-scan        — gitleaks(用本仓 .gitleaks.toml)
#   3. branding-scan      — check_branding(空 example 应 0 命中)
#   4. pii-scan           — detect_pii(无数据目录应 0 命中)
#
# 注:branding_keywords.example.yaml 在开源仓内是空的(无品牌名),
#    真实关键词通过 ~/.config/channel-analytics/ 在部署环境注入。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint + Test
  # -----------------------------------------------------------------------
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy channel_analytics || true  # mypy 在 alpha 阶段不阻断

      - name: Pytest
        env:
          DATABASE_URL: sqlite:///:memory:
          SESSION_SECRET: ci-test-secret-64chars-padding-padding-padding-paddingxx
          JWT_SECRET: ci-jwt-secret-64chars-padding-padding-padding-paddingxxxx
        run: pytest -ra --tb=short

  # -----------------------------------------------------------------------
  # 2. Secret scan — gitleaks
  # -----------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # 3. Branding scan — check_branding
  # -----------------------------------------------------------------------
  branding-scan:
    name: Branding scan (P0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install pyyaml
      - name: Scan with empty example template (expect 0 hits, exit 0)
        run: |
          python scripts/check_branding.py \
            --root . \
            --keywords scripts/branding_keywords.example.yaml

  # -----------------------------------------------------------------------
  # 4. PII scan — detect_pii
  # -----------------------------------------------------------------------
  pii-scan:
    name: PII scan (P0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install pyyaml
      - name: Scan with empty keywords (expect 0 hits, exit 0)
        run: |
          # etl_data / uploads / logs 在本仓不存在,扫描应 0 命中
          python scripts/detect_pii.py --root ./data || true
          python scripts/detect_pii.py --root ./etl_data || true
          python scripts/detect_pii.py --root ./uploads || true
          python scripts/detect_pii.py --root ./logs || true

  # -----------------------------------------------------------------------
  # 5. Dependency audit — pip-audit (Python) + npm audit (frontend)
  # -----------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (P0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          # 仅检查 requirements 中已声明的依赖 (避免噪音)
          pip-audit --strict --requirement pyproject.toml || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            echo "No package-lock.json — skipping npm audit"
          fi

  # -----------------------------------------------------------------------
  # Aggregate:全部通过才 merge
  # -----------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [test, secret-scan, branding-scan, pii-scan, dependency-audit]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.branding-scan.result }}" != "success" ] || \
             [ "${{ needs.pii-scan.result }}" != "success" ] || \
             [ "${{ needs.dependency-audit.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All CI checks passed."