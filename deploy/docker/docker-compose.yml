# channel-analytics docker-compose(开发/自部署)
#
# 用法:
#   cp .env.example .env  && 编辑 .env
#   docker compose up -d
#
# 数据库可选:
#   - SQLite(默认,无需 MySQL/Postgres 容器,数据在 ./data/dev.db)
#   - MySQL  → 改 DATABASE_URL=mysql+pymysql://... + 启用 mysql 服务
#   - Postgres → 改 DATABASE_URL=postgresql+psycopg://... + 启用 postgres 服务

services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    container_name: channel-analytics-api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../rpa_downloads:/app/data/rpa_downloads
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

